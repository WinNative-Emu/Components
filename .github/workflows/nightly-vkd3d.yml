name: Nightly VKD3D

# Builds vkd3d-proton for x86_64 and ARM64EC from upstream master.
#
# Fix vs. the reference setup: each job now checks for its OWN tag prefix
# (vkd3d-nightly- / vkd3d-arm64ec-nightly-) instead of a bare "-<hash>" match.
# The old check matched the sibling job's release and wrongly skipped a build.

on:
  schedule:
    - cron: '14 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-standard:
    name: VKD3D (x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vkd3d-proton
        uses: actions/checkout@v4
        with:
          repository: HansKristian-Work/vkd3d-proton
          path: src
          submodules: recursive
          fetch-depth: 0

      - name: Check for updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "UPSTREAM_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "COMMIT_HASH=${SHORT_HASH}" >> $GITHUB_ENV
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          elif gh release list --repo ${{ github.repository }} --limit 100 | grep -q "vkd3d-nightly-${SHORT_HASH}"; then
            echo "SHOULD_BUILD=false" >> $GITHUB_ENV
          else
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        if: env.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl xz-utils jq git glslang-tools build-essential \
            python3 python3-pip pkg-config meson ninja-build zstd ccache

      - name: Restore llvm-mingw
        if: env.SHOULD_BUILD == 'true'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: /opt/llvm-mingw
          key: llvm-mingw-20251104

      - name: Setup llvm-mingw
        if: env.SHOULD_BUILD == 'true' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/20251104/llvm-mingw-20251104-ucrt-ubuntu-22.04-x86_64.tar.xz" -O llvm.tar.xz
          sudo rm -rf /opt/llvm-mingw
          sudo mkdir -p /opt/llvm-mingw
          sudo tar -C /opt/llvm-mingw --strip-components=1 -xJf llvm.tar.xz
          rm llvm.tar.xz

      - name: Set PATH
        if: env.SHOULD_BUILD == 'true'
        run: echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

      - name: Restore ccache
        if: env.SHOULD_BUILD == 'true'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-vkd3d-${{ env.UPSTREAM_HASH }}
          restore-keys: ccache-vkd3d-

      - name: Configure ccache
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Generate version info
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd src
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "VERSION_NAME=${LATEST_TAG}-${COMMIT_HASH}" >> $GITHUB_ENV

      - name: Build
        if: env.SHOULD_BUILD == 'true'
        run: |
          cat <<EOF > cross-x64.txt
          [binaries]
          c = ['ccache', '/opt/llvm-mingw/bin/x86_64-w64-mingw32-clang']
          cpp = ['ccache', '/opt/llvm-mingw/bin/x86_64-w64-mingw32-clang++']
          ar = '/opt/llvm-mingw/bin/llvm-ar'
          strip = '/opt/llvm-mingw/bin/llvm-strip'
          windres = '/opt/llvm-mingw/bin/x86_64-w64-mingw32-windres'
          widl = '/opt/llvm-mingw/bin/x86_64-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          exe_wrapper = ['wine']
          [host_machine]
          system = 'windows'
          cpu_family = 'x86_64'
          cpu = 'x86_64'
          endian = 'little'
          EOF
          cat <<EOF > cross-x86.txt
          [binaries]
          c = ['ccache', '/opt/llvm-mingw/bin/i686-w64-mingw32-clang']
          cpp = ['ccache', '/opt/llvm-mingw/bin/i686-w64-mingw32-clang++']
          ar = '/opt/llvm-mingw/bin/llvm-ar'
          strip = '/opt/llvm-mingw/bin/llvm-strip'
          windres = '/opt/llvm-mingw/bin/i686-w64-mingw32-windres'
          widl = '/opt/llvm-mingw/bin/i686-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          exe_wrapper = ['wine']
          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          EOF
          cd src
          meson setup build-x64 --cross-file ../cross-x64.txt -Dbuildtype=release -Dstrip=true
          ninja -C build-x64
          meson setup build-x86 --cross-file ../cross-x86.txt -Dbuildtype=release -Dstrip=true
          ninja -C build-x86

      - name: Package .wcp
        if: env.SHOULD_BUILD == 'true'
        run: |
          rm -rf final_package
          mkdir -p final_package/system32 final_package/syswow64
          find src/build-x64 -name "d3d12.dll"     -exec cp -L {} final_package/system32/ \;
          find src/build-x64 -name "d3d12core.dll" -exec cp -L {} final_package/system32/ \;
          find src/build-x86 -name "d3d12.dll"     -exec cp -L {} final_package/syswow64/ \;
          find src/build-x86 -name "d3d12core.dll" -exec cp -L {} final_package/syswow64/ \;
          cat <<EOF > final_package/profile.json
          {
            "type": "VKD3D",
            "versionName": "${{ env.VERSION_NAME }}",
            "versionCode": 0,
            "description": "vkd3d-proton nightly ${{ env.COMMIT_HASH }}",
            "files": [
              { "source": "system32/d3d12.dll",     "target": "\${system32}/d3d12.dll" },
              { "source": "system32/d3d12core.dll", "target": "\${system32}/d3d12core.dll" },
              { "source": "syswow64/d3d12.dll",     "target": "\${syswow64}/d3d12.dll" },
              { "source": "syswow64/d3d12core.dll", "target": "\${syswow64}/d3d12core.dll" }
            ]
          }
          EOF
          cd final_package
          tar -cJf "../Vkd3d-${{ env.VERSION_NAME }}.wcp" *

      - name: Publish release
        if: env.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vkd3d-nightly-${{ env.COMMIT_HASH }}
          name: VKD3D Nightly ${{ env.COMMIT_HASH }}
          files: '*.wcp'
          body: |
            Automated nightly build of vkd3d-proton (x86_64).
            Upstream commit: https://github.com/HansKristian-Work/vkd3d-proton/commit/${{ env.UPSTREAM_HASH }}

      - name: Prune old nightlies
        if: env.SHOULD_BUILD == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo ${{ github.repository }} --limit 500 --json tagName,createdAt \
            --jq '[.[] | select(.tagName | startswith("vkd3d-nightly-"))] | sort_by(.createdAt) | reverse | .[8:] | .[].tagName' \
          | while read -r TAG; do
              [ -n "$TAG" ] || continue
              echo "Deleting old release: $TAG"
              gh release delete "$TAG" --repo ${{ github.repository }} --cleanup-tag -y || true
              sleep 2
            done

  build-arm64ec:
    name: VKD3D (ARM64EC)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout vkd3d-proton
        uses: actions/checkout@v4
        with:
          repository: HansKristian-Work/vkd3d-proton
          path: src
          submodules: recursive
          fetch-depth: 0

      - name: Check for updates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "UPSTREAM_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "COMMIT_HASH=${SHORT_HASH}" >> $GITHUB_ENV
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          elif gh release list --repo ${{ github.repository }} --limit 100 | grep -q "vkd3d-arm64ec-nightly-${SHORT_HASH}"; then
            echo "SHOULD_BUILD=false" >> $GITHUB_ENV
          else
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        if: env.SHOULD_BUILD == 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl xz-utils jq git python3 pkg-config \
            zstd meson ninja-build wget unzip build-essential ccache

      - name: Restore glslang
        if: env.SHOULD_BUILD == 'true'
        id: cache-glslang
        uses: actions/cache@v4
        with:
          path: glslang
          key: glslang-master-tot

      - name: Setup glslang
        if: env.SHOULD_BUILD == 'true' && steps.cache-glslang.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/KhronosGroup/glslang/releases/download/master-tot/glslang-master-linux-Release.zip
          unzip -q glslang-master-linux-Release.zip -d glslang
          rm glslang-master-linux-Release.zip

      - name: Restore llvm-mingw
        if: env.SHOULD_BUILD == 'true'
        id: cache-llvm-mingw
        uses: actions/cache@v4
        with:
          path: /opt/llvm-mingw
          key: llvm-mingw-20251104

      - name: Setup llvm-mingw
        if: env.SHOULD_BUILD == 'true' && steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/mstorsjo/llvm-mingw/releases/download/20251104/llvm-mingw-20251104-ucrt-ubuntu-22.04-x86_64.tar.xz" -O llvm.tar.xz
          sudo rm -rf /opt/llvm-mingw
          sudo mkdir -p /opt/llvm-mingw
          sudo tar -C /opt/llvm-mingw --strip-components=1 -xJf llvm.tar.xz
          rm llvm.tar.xz

      - name: Set PATH
        if: env.SHOULD_BUILD == 'true'
        run: |
          echo "$PWD/glslang/bin" >> $GITHUB_PATH
          echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH

      - name: Restore ccache
        if: env.SHOULD_BUILD == 'true'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-vkd3d-arm64ec-${{ env.UPSTREAM_HASH }}
          restore-keys: ccache-vkd3d-arm64ec-

      - name: Configure ccache
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p .ccache
          echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=500M" >> $GITHUB_ENV

      - name: Generate version info
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd src
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "VERSION_NAME=${LATEST_TAG}-arm64ec-${COMMIT_HASH}" >> $GITHUB_ENV

      - name: Build
        if: env.SHOULD_BUILD == 'true'
        run: |
          cat <<EOF > arm64ec.txt
          [binaries]
          c = ['ccache', 'arm64ec-w64-mingw32-clang']
          cpp = ['ccache', 'arm64ec-w64-mingw32-clang++']
          ar = 'llvm-ar'
          strip = 'llvm-strip'
          windres = 'arm64ec-w64-mingw32-windres'
          widl = 'arm64ec-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          [host_machine]
          system = 'windows'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF
          cat <<EOF > x86.txt
          [binaries]
          c = ['ccache', 'i686-w64-mingw32-clang']
          cpp = ['ccache', 'i686-w64-mingw32-clang++']
          ar = 'llvm-ar'
          strip = 'llvm-strip'
          windres = 'i686-w64-mingw32-windres'
          widl = 'i686-w64-mingw32-widl'
          pkg-config = 'pkg-config'
          [host_machine]
          system = 'windows'
          cpu_family = 'x86'
          cpu = 'i686'
          endian = 'little'
          EOF
          cd src
          meson setup build-ec --cross-file ../arm64ec.txt -Dbuildtype=release -Dstrip=true
          ninja -C build-ec -j 2
          meson setup build-x86 --cross-file ../x86.txt -Dbuildtype=release -Dstrip=true
          ninja -C build-x86 -j 2

      - name: Package .wcp
        if: env.SHOULD_BUILD == 'true'
        run: |
          rm -rf final_package
          mkdir -p final_package/system32 final_package/syswow64
          find src/build-ec  -name "d3d12.dll"     -exec cp -L {} final_package/system32/ \;
          find src/build-ec  -name "d3d12core.dll" -exec cp -L {} final_package/system32/ \;
          find src/build-x86 -name "d3d12.dll"     -exec cp -L {} final_package/syswow64/ \;
          find src/build-x86 -name "d3d12core.dll" -exec cp -L {} final_package/syswow64/ \;
          llvm-strip --strip-all final_package/system32/*.dll
          llvm-strip --strip-all final_package/syswow64/*.dll
          cat <<EOF > final_package/profile.json
          {
            "type": "VKD3D",
            "versionName": "${{ env.VERSION_NAME }}",
            "versionCode": 0,
            "description": "vkd3d-proton ARM64EC nightly ${{ env.COMMIT_HASH }}",
            "files": [
              { "source": "system32/d3d12.dll",     "target": "\${system32}/d3d12.dll" },
              { "source": "system32/d3d12core.dll", "target": "\${system32}/d3d12core.dll" },
              { "source": "syswow64/d3d12.dll",     "target": "\${syswow64}/d3d12.dll" },
              { "source": "syswow64/d3d12core.dll", "target": "\${syswow64}/d3d12core.dll" }
            ]
          }
          EOF
          cd final_package
          tar -cf ../archive.tar .
          cd ..
          xz -9 archive.tar
          mv archive.tar.xz "Vkd3d-${{ env.VERSION_NAME }}.wcp"

      - name: Publish release
        if: env.SHOULD_BUILD == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vkd3d-arm64ec-nightly-${{ env.COMMIT_HASH }}
          name: VKD3D ARM64EC Nightly ${{ env.COMMIT_HASH }}
          files: '*.wcp'
          body: |
            Automated nightly build of vkd3d-proton (ARM64EC).
            Upstream commit: https://github.com/HansKristian-Work/vkd3d-proton/commit/${{ env.UPSTREAM_HASH }}

      - name: Prune old nightlies
        if: env.SHOULD_BUILD == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo ${{ github.repository }} --limit 500 --json tagName,createdAt \
            --jq '[.[] | select(.tagName | startswith("vkd3d-arm64ec-nightly-"))] | sort_by(.createdAt) | reverse | .[8:] | .[].tagName' \
          | while read -r TAG; do
              [ -n "$TAG" ] || continue
              echo "Deleting old release: $TAG"
              gh release delete "$TAG" --repo ${{ github.repository }} --cleanup-tag -y || true
              sleep 2
            done
